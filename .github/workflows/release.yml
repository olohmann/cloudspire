name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------------
  # 1. Validate
  # ------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

  # ------------------------------------------------------------------
  # 2. Build, scan, and push Docker image
  # ------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: validate
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ------------------------------------------------------------------
  # 3. Package and push Helm chart
  # ------------------------------------------------------------------
  helm:
    runs-on: ubuntu-latest
    needs: [validate, docker]
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" charts/cloudspire/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/cloudspire/Chart.yaml
          cat charts/cloudspire/Chart.yaml

      - name: Lint chart
        run: helm lint charts/cloudspire

      - name: Package chart
        run: helm package charts/cloudspire --destination .helm-packages

      - name: Push chart to GHCR
        run: |
          helm push .helm-packages/cloudspire-${VERSION}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

  # ------------------------------------------------------------------
  # 4. Create GitHub Release
  # ------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [validate, docker, helm]
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Artifacts

            **Docker image:**
            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ```

            **Helm chart:**
            ```
            helm pull oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/cloudspire --version ${{ env.VERSION }}
            ```

            **Image digest:** `${{ needs.docker.outputs.digest }}`
